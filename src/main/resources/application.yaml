server:
  port: 8080

spring:
  application:
    name: budget-identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/budget_identity_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 587
    username: 810e67c078a134
    password: 142d9fd0e420b2
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      issuer: budget-app
      access-token-minutes: 60
      key-id: "budget-auth-kid-001"
      private-key-location: "classpath:keys/jwt-private.pem"
      public-key-location: "classpath:keys/jwt-public.pem"

    auth:
      max-failed-attempts: 5
      lock-minutes: 15
      verification-token-minutes: 1440
      verification-base-url: "http://localhost:8080/api/auth/verify-email?token="
      verification-from: "no-reply@budget-app.local"
      email-change-base-url: "http://localhost:8080/api/profile/verify-email-change?token="
      reset-base-url: "http://localhost:8080/api/auth/reset-password?token="
      resend-cooldown-minutes: 5
      reset-token-minutes: 30
      refresh-days-default: 1
      refresh-days-remember-me: 30